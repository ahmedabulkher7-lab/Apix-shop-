<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | APEX Admin</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- APEX CSS -->
  <link rel="stylesheet" href="../assets/css/apex.css">
  <style>
    body { background-color: var(--bg-main); }
    .admin-wrapper { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 280px; background: var(--bg-darkest); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 1000; transition: all 0.3s ease; }
    .admin-brand { height: 70px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border-color); font-family: var(--font-heading); font-size: 2rem; color: var(--text-primary); text-decoration: none; letter-spacing: 2px; }
    .admin-nav { flex-grow: 1; padding: 20px 0; overflow-y: auto; }
    .admin-nav-item { padding: 0 16px; margin-bottom: 4px; }
    .admin-nav-link { display: flex; align-items: center; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; transition: all 0.2s ease; }
    .admin-nav-link i { width: 24px; font-size: 18px; margin-right: 10px; }
    .admin-nav-link:hover, .admin-nav-link.active { color: var(--apex-gold); background: rgba(242, 185, 28, 0.1); }
    .admin-user { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
    .admin-main { flex-grow: 1; margin-left: 280px; display: flex; flex-direction: column; min-width: 0; }
    .admin-header { height: 70px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: sticky; top: 0; z-index: 999; }
    .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; position: relative; transition: color 0.2s; }
    .icon-btn:hover { color: var(--apex-gold); }
    .admin-content { padding: 30px; flex-grow: 1; }
    .page-title { font-family: var(--font-heading); font-size: 2rem; letter-spacing: 1px; margin-bottom: 0; color: var(--text-primary); }
    
    /* Settings Tabs styling */
    .settings-nav { border-right: 1px solid var(--border-color); padding-right: 20px; height: 100%; }
    .settings-link { display: block; padding: 12px 20px; color: var(--text-muted); text-decoration: none; font-weight: 600; border-radius: var(--radius-sm); margin-bottom: 8px; transition: all 0.3s; }
    .settings-link:hover, .settings-link.active { background: rgba(242, 185, 28, 0.1); color: var(--apex-gold); }
    
    @media (max-width: 991.98px) {
      .admin-sidebar { transform: translateX(-100%); }
      .admin-main { margin-left: 0; }
      .sidebar-open .admin-sidebar { transform: translateX(0); }
      .settings-nav { border-right: none; border-bottom: 1px solid var(--border-color); padding-right: 0; padding-bottom: 20px; margin-bottom: 20px; display: flex; overflow-x: auto; gap: 10px; }
      .settings-link { margin-bottom: 0; white-space: nowrap; }
    }
  </style>
</head>
<body>

  <div class="admin-wrapper" id="adminWrapper">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <a href="index.html" class="admin-brand text-gold">APEX <span class="text-white ms-2" style="font-size: 1rem; font-family: var(--font-body); letter-spacing: 0;">ADMIN</span></a>
      <div class="admin-nav">
        <div class="admin-nav-item"><a href="index.html" class="admin-nav-link"><i class="fas fa-th-large"></i> Dashboard</a></div>
        <div class="px-4 py-2 mt-2 mb-1 text-muted-apex" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Store Management</div>
        <div class="admin-nav-item"><a href="products.html" class="admin-nav-link"><i class="fas fa-dumbbell"></i> Products</a></div>
        <div class="admin-nav-item"><a href="categories.html" class="admin-nav-link"><i class="fas fa-tags"></i> Categories</a></div>
        <div class="admin-nav-item"><a href="inventory.html" class="admin-nav-link"><i class="fas fa-boxes"></i> Inventory</a></div>
        <div class="px-4 py-2 mt-3 mb-1 text-muted-apex" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Sales & Users</div>
        <div class="admin-nav-item"><a href="orders.html" class="admin-nav-link"><i class="fas fa-shopping-cart"></i> Orders</a></div>
        <div class="admin-nav-item"><a href="customers.html" class="admin-nav-link"><i class="fas fa-users"></i> Customers</a></div>
        <div class="admin-nav-item"><a href="coupons.html" class="admin-nav-link"><i class="fas fa-ticket-alt"></i> Coupons</a></div>
        <div class="px-4 py-2 mt-3 mb-1 text-muted-apex" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">System</div>
        <div class="admin-nav-item"><a href="analytics.html" class="admin-nav-link"><i class="fas fa-chart-bar"></i> Analytics</a></div>
        <div class="admin-nav-item"><a href="settings.html" class="admin-nav-link active"><i class="fas fa-cog"></i> Settings</a></div>
      </div>
      <div class="admin-user">
        <div style="width: 40px; height: 40px; background: var(--apex-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-darkest); font-weight: 700;">AD</div>
        <div>
          <div class="text-white fw-bold" style="font-size: 14px;">Admin User</div>
          <div class="text-muted-apex" style="font-size: 12px;">Superadmin</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn d-lg-none" onclick="document.getElementById('adminWrapper').classList.toggle('sidebar-open')"><i class="fas fa-bars"></i></button>
        </div>
        <div class="admin-header-actions">
          <button class="icon-btn position-relative"><i class="far fa-bell"></i></button>
        </div>
      </header>

      <div class="admin-content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="page-title m-0">STORE SETTINGS</h1>
          <button class="btn-apex-primary px-4">SAVE CHANGES</button>
        </div>
        
        <div class="apex-card">
          <div class="row">
            <!-- Settings Navigation -->
            <div class="col-lg-3">
              <div class="settings-nav">
                <a href="#" class="settings-link active"><i class="fas fa-store me-2"></i> General</a>
                <a href="#" class="settings-link"><i class="fas fa-credit-card me-2"></i> Payment Providers</a>
                <a href="#" class="settings-link"><i class="fas fa-truck me-2"></i> Shipping</a>
                <a href="#" class="settings-link"><i class="fas fa-envelope me-2"></i> Email Notifications</a>
                <a href="#" class="settings-link"><i class="fas fa-lock me-2"></i> Security & Privacy</a>
                <a href="#" class="settings-link"><i class="fas fa-code me-2"></i> Advanced API</a>
              </div>
            </div>
            
            <!-- Settings Form Area -->
            <div class="col-lg-9 ps-lg-4">
              <h5 class="text-white mb-4 border-bottom border-apex pb-2" style="font-family: var(--font-heading); font-size: 1.5rem; letter-spacing: 1px;">GENERAL STORE SETTINGS</h5>
              
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Store Name</label>
                  <input type="text" class="apex-form-control" value="APEX Fitness">
                </div>
                <div class="col-md-6">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Store Contact Email</label>
                  <input type="email" class="apex-form-control" value="hello@apexfitness.com">
                </div>
                <div class="col-md-6">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Support Phone Number</label>
                  <input type="text" class="apex-form-control" value="+1 (800) 555-0100">
                </div>
                <div class="col-md-6">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Store Currency</label>
                  <select class="form-select apex-form-control">
                    <option value="USD" selected>USD ($) - US Dollar</option>
                    <option value="EUR">EUR (€) - Euro</option>
                    <option value="GBP">GBP (£) - British Pound</option>
                    <option value="CAD">CAD ($) - Canadian Dollar</option>
                  </select>
                </div>
                
                <div class="col-12 mt-4">
                  <h6 class="text-white mb-3" style="font-weight: 600;">Store Address</h6>
                </div>
                
                <div class="col-12">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Address Line 1</label>
                  <input type="text" class="apex-form-control" value="123 Iron Forge Boulevard">
                </div>
                <div class="col-md-4">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">City</label>
                  <input type="text" class="apex-form-control" value="Columbus">
                </div>
                <div class="col-md-4">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">State/Province</label>
                  <input type="text" class="apex-form-control" value="OH">
                </div>
                <div class="col-md-4">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Zip Code</label>
                  <input type="text" class="apex-form-control" value="43215">
                </div>
                <div class="col-12">
                  <label class="form-label text-muted-apex" style="font-size: 12px; font-weight: 700; text-transform: uppercase;">Country</label>
                  <select class="form-select apex-form-control">
                    <option value="US" selected>United States</option>
                    <option value="CA">Canada</option>
                  </select>
                </div>
                
              </div>
            </div>
          </div>
        </div>
        
      </div>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
